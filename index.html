<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WORD INDUCTION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono&display=swap');
        :root { 
            --accent: rgb(99, 102, 241); 
            --bg: rgb(2, 4, 8); 
            --glass: rgba(15, 23, 42, 0.8);
        }
        html, body, div, nav, header, main, footer, section, h1, h2, p, button, input, textarea, canvas { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: rgb(241, 245, 249);
            margin: 0; padding: 0;
            overflow-x: hidden;
        }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        input[type=range] {
            -webkit-appearance: none;
            background: transparent;
            width: 100%; height: 32px;
            cursor: pointer;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 4px;
            background: rgb(30, 41, 59); border-radius: 2px;
        }
        input[type=range]::-webkit-slider-thumb {
            height: 20px; width: 20px;
            border-radius: 50%;
            background: var(--accent);
            -webkit-appearance: none;
            margin-top: -8px;
            border: 3px solid var(--bg);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
        }
        .glass {
            background: var(--glass);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .active-glow {
            box-shadow: 0 0 40px rgba(79, 70, 229, 0.3);
            border-color: rgba(99, 102, 241, 0.4);
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes sweep {
            from { transform: translateX(-100%); }
            to   { transform: translateX(100%); }
        }
        .scanner-line {
            width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            animation: sweep 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        .tab-btn {
            position: relative; overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 900;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-size: 0.65rem;
            border-radius: 0.75rem;
            padding: 0.75rem 1.25rem;
            white-space: nowrap;
        }
        .tab-btn.active {
            background: var(--accent);
            color: white;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }
        .tab-btn:not(.active) { color: rgb(100, 116, 139); }
        .tab-btn:not(.active):hover { color: white; background: rgba(255,255,255,0.05); }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .spin { animation: spin 1s linear infinite; }
        .toast {
            position: fixed; bottom: 2rem;
            left: 50%; transform: translateX(-50%);
            padding: 0.75rem 1.25rem;
            border-radius: 9999px;
            z-index: 1000;
            display: flex; align-items: center; gap: 0.5rem;
            font-size: 0.625rem; font-weight: 900;
            letter-spacing: 0.1em; text-transform: uppercase;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
            pointer-events: none;
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp {
            from { transform: translate(-50%, 20px); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

const ICONS = {
    brain:    ["M9.5 2a2.5 2.5 0 1 1 5 0","M9 7a3 3 0 0 0-3 3v1a3 3 0 0 0 3 3h6a3 3 0 0 0 3-3v-1a3 3 0 0 0-3-3H9z","M9 17v4","M15 17v4","M12 17v-4"],
    waves:    ["M2 12c0-2 1.5-3 3-3s3 1 3 3 1.5 3 3 3 3-1 3-3 1.5-3 3-3 3 1 3 3"],
    radio:    ["M4.9 19.1C1 15.2 1 8.8 4.9 4.9","M7.8 16.2c-2.3-2.3-2.3-6.1 0-8.5","M12 12h.01","M16.2 7.8c2.3 2.3 2.3 6.1 0 8.5","M19.1 4.9C23 8.8 23 15.1 19.1 19"],
    settings: ["M12 20a8 8 0 1 0 0-16 8 8 0 0 0 0 16z","M12 14a2 2 0 1 0 0-4 2 2 0 0 0 0 4z","M12 2v2","M12 20v2","M4.93 4.93l1.41 1.41","M17.66 17.66l1.41 1.41","M2 12h2","M20 12h2","M6.34 17.66l-1.41 1.41","M19.07 4.93l-1.41 1.41"],
    sparkles: ["M12 3l1.5 4.5L18 9l-4.5 1.5L12 15l-1.5-4.5L6 9l4.5-1.5z","M19 3l.75 2.25L22 6l-2.25.75L19 9l-.75-2.25L16 6l2.25-.75z"],
    mic:      ["M12 1a3 3 0 0 1 3 3v8a3 3 0 0 1-6 0V4a3 3 0 0 1 3-3z","M19 10v2a7 7 0 0 1-14 0v-2","M12 19v4","M8 23h8"],
    check:    "M20 6L9 17l-5-5",
    alert:    ["M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z","M12 8v4","M12 16h.01"],
    play:     "M5 3l14 9-14 9V3z",
    stop:     "M4 4h16v16H4z",
    upload:   ["M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4","M17 8l-5-5-5 5","M12 3v12"],
    refresh:  "M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"
};

const Icon = ({ name, size = 16, className = "" }) => {
    const d = ICONS[name];
    if (!d) return null;
    return (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
            {Array.isArray(d) ? d.map((p, i) => <path key={i} d={p} />) : <path d={d} />}
        </svg>
    );
};

const FREQ_0 = 17500;   
const FREQ_1 = 19200;   
const BAUD = 10;      
const BIT_DUR = 1 / BAUD;
const PREAMBLE = '10101010';
const STOP_SEQ = '00000000';
const APP_DB = 'WordInductionVault';

const openDB = () => new Promise((res, rej) => {
    const req = indexedDB.open(APP_DB, 9);
    req.onupgradeneeded = e => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains('assets')) db.createObjectStore('assets', { keyPath: 'id' });
        if (!db.objectStoreNames.contains('config')) db.createObjectStore('config', { keyPath: 'id' });
    };
    req.onsuccess = () => res(req.result);
    req.onerror = () => rej(req.error);
});

const dbGet = async (store, key) => {
    try {
        const db = await openDB();
        const tx = db.transaction(store, 'readonly');
        return new Promise(res => {
            const req = tx.objectStore(store).get(key);
            req.onsuccess = () => res(req.result || null);
            req.onerror = () => res(null);
        });
    } catch { return null; }
};

const dbPut = async (store, val) => {
    try {
        const db = await openDB();
        const tx = db.transaction(store, 'readwrite');
        return new Promise((res, rej) => {
            const req = tx.objectStore(store).put(val);
            req.onsuccess = () => res();
            req.onerror = () => rej(req.error);
        });
    } catch (e) { console.error(e); }
};

const App = () => {
    const [activeTab, setActiveTab] = useState('induction');
    const [bgFile, setBgFile] = useState(null);
    const [voiceFile, setVoiceFile] = useState(null);
    const [isPlaying, setIsPlaying] = useState(false);
    const [maskingLevel, setMaskingLevel] = useState(75);
    const [volumeRatio, setVolumeRatio] = useState(15);
    const [toast, setToast] = useState(null);
    const [txText, setTxText] = useState('');
    const [rxText, setRxText] = useState('');
    const [isTransmitting, setIsTransmitting] = useState(false);
    const [isListening, setIsListening] = useState(false);
    const [targetWord, setTargetWord] = useState('');
    const [inductionScript, setInductionScript] = useState('');
    const [inductionMode, setInductionMode] = useState('script'); 
    const [isGenerating, setIsGenerating] = useState(false);
    const [isDecoding, setIsDecoding] = useState(false);

    const audioCtx = useRef(null);
    const maskNodes = useRef({});
    const canvasRef = useRef(null);
    const sonicCanvasRef = useRef(null);
    const animFrameRef = useRef(null);
    const isPlayingRef = useRef(false);
    
    const txOsc = useRef(null);
    const txGain = useRef(null);
    const txLoopRef = useRef(null);
    const micStream = useRef(null);
    const rxAnaRef = useRef(null);
    const rxFrameRef = useRef(null);
    const bitBuf = useRef('');
    const lastTickRef = useRef(0);
    const syncFound = useRef(false);

    const notify = useCallback((msg, type = 'error') => {
        setToast({ msg, type });
        setTimeout(() => setToast(null), 3000);
    }, []);

    useEffect(() => {
        (async () => {
            const bg = await dbGet('assets', 'bg');
            if (bg) setBgFile({ name: bg.name, data: bg.data });
            const vc = await dbGet('assets', 'voice');
            if (vc) setVoiceFile({ name: vc.name, data: vc.data });
        })();
    }, []);

    const handleFile = async (e, type) => {
        const file = e.target.files[0];
        if (!file) return;
        const buf = await file.arrayBuffer();
        await dbPut('assets', { id: type, data: buf, name: file.name });
        if (type === 'bg') setBgFile({ name: file.name, data: buf });
        else setVoiceFile({ name: file.name, data: buf });
        notify(`${file.name} localized.`, 'success');
    };

    const ensureAudioCtx = async () => {
        if (!audioCtx.current || audioCtx.current.state === 'closed') {
            audioCtx.current = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.current.state === 'suspended') {
            await audioCtx.current.resume();
        }
        return audioCtx.current;
    };

    const killAllAudio = useCallback(() => {
        isPlayingRef.current = false;
        if (animFrameRef.current) cancelAnimationFrame(animFrameRef.current);
        if (rxFrameRef.current) cancelAnimationFrame(rxFrameRef.current);
        Object.values(maskNodes.current).forEach(n => {
            try { n.stop(); } catch {}
            try { n.disconnect(); } catch {}
        });
        maskNodes.current = {};
        if (txOsc.current) { try { txOsc.current.stop(); } catch {} }
        if (txLoopRef.current) clearTimeout(txLoopRef.current);
        if (micStream.current) micStream.current.getTracks().forEach(t => t.stop());
        setIsPlaying(false);
        setIsTransmitting(false);
        setIsListening(false);
    }, []);

    const startVisuals = (canvas, ana) => {
        if (!canvas || !ana) return;
        const ctx = canvas.getContext('2d');
        const data = new Uint8Array(ana.frequencyBinCount);
        const draw = () => {
            if (!isPlayingRef.current && !isListening) return;
            animFrameRef.current = requestAnimationFrame(draw);
            ana.getByteFrequencyData(data);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const bw = (canvas.width / data.length) * 2;
            for (let i = 0; i < data.length; i++) {
                const v = data[i] / 255;
                const h = v * canvas.height;
                ctx.fillStyle = `rgba(99, 102, 241, ${v * 0.8})`;
                ctx.fillRect(i * (bw + 1), canvas.height - h, bw, h);
            }
        };
        draw();
    };

    const igniteMask = async () => {
        if (isPlaying) { killAllAudio(); return; }
        if (!bgFile || !voiceFile) { notify('Inputs missing: Carrier/Directive required.'); return; }
        setIsDecoding(true);
        try {
            const ctx = await ensureAudioCtx();
            const [bgB, vcB] = await Promise.all([
                ctx.decodeAudioData(bgFile.data.slice(0)),
                ctx.decodeAudioData(voiceFile.data.slice(0))
            ]);
            const n = maskNodes.current;
            n.bg = ctx.createBufferSource();
            n.bg.buffer = bgB;
            n.bg.loop = true;
            n.vc = ctx.createBufferSource();
            n.vc.buffer = vcB;
            n.vc.loop = true;
            n.ana = ctx.createAnalyser();
            n.ana.fftSize = 256;
            n.filter = ctx.createBiquadFilter();
            n.filter.type = 'lowpass';
            n.filter.frequency.value = 4500 - (maskingLevel / 100) * 4000;
            n.vcGain = ctx.createGain();
            n.vcGain.gain.value = (volumeRatio / 100) * 0.15;
            n.bg.connect(n.ana).connect(ctx.destination);
            n.vc.connect(n.filter).connect(n.vcGain).connect(ctx.destination);
            n.bg.start();
            n.vc.start();
            isPlayingRef.current = true;
            setIsPlaying(true);
            startVisuals(canvasRef.current, n.ana);
        } catch (e) {
            notify('Hardware error: Context failure.');
        } finally {
            setIsDecoding(false);
        }
    };

    useEffect(() => {
        const n = maskNodes.current;
        const ctx = audioCtx.current;
        if (n.filter && ctx) n.filter.frequency.setTargetAtTime(4500 - (maskingLevel / 100) * 4000, ctx.currentTime, 0.1);
        if (n.vcGain && ctx) n.vcGain.gain.setTargetAtTime((volumeRatio / 100) * 0.15, ctx.currentTime, 0.1);
    }, [maskingLevel, volumeRatio]);

    const transmit = async () => {
        if (isTransmitting) { killAllAudio(); return; }
        if (!txText) { notify('Payload void: Enter data.'); return; }
        const bits = PREAMBLE + Array.from(txText).map(c => c.charCodeAt(0).toString(2).padStart(8, '0')).join('') + STOP_SEQ;
        const ctx = await ensureAudioCtx();
        txOsc.current = ctx.createOscillator();
        txGain.current = ctx.createGain();
        txGain.current.gain.value = 0;
        txOsc.current.connect(txGain.current).connect(ctx.destination);
        txOsc.current.start();
        setIsTransmitting(true);
        const run = () => {
            const now = ctx.currentTime;
            txGain.current.gain.setTargetAtTime(0.8, now, 0.01);
            let t = now + 0.05;
            for (let b of bits) {
                txOsc.current.frequency.setValueAtTime(b === '1' ? FREQ_1 : FREQ_0, t);
                t += BIT_DUR;
            }
            txGain.current.gain.setTargetAtTime(0, t, 0.01);
            txLoopRef.current = setTimeout(run, (bits.length * BIT_DUR + 0.8) * 1000);
        };
        run();
    };

    const listen = async () => {
        if (isListening) { killAllAudio(); return; }
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false } 
            });
            micStream.current = stream;
            const ctx = await ensureAudioCtx();
            const src = ctx.createMediaStreamSource(stream);
            const ana = ctx.createAnalyser();
            ana.fftSize = 4096;
            ana.smoothingTimeConstant = 0.1;
            src.connect(ana);
            rxAnaRef.current = ana;
            setIsListening(true);
            setRxText('Scanning frequencies...');
            lastTickRef.current = ctx.currentTime;
            bitBuf.current = "";
            syncFound.current = false;
            const b0 = Math.round(FREQ_0 / (ctx.sampleRate / ana.fftSize));
            const b1 = Math.round(FREQ_1 / (ctx.sampleRate / ana.fftSize));
            const loop = () => {
                rxFrameRef.current = requestAnimationFrame(loop);
                const now = ctx.currentTime;
                if (now - lastTickRef.current < BIT_DUR * 0.95) return;
                lastTickRef.current = now;
                const data = new Float32Array(ana.frequencyBinCount);
                ana.getFloatFrequencyData(data);
                const getPeak = (idx) => {
                    let max = -Infinity;
                    for(let i = idx-1; i <= idx+1; i++) if(data[i] > max) max = data[i];
                    return max;
                };
                const p0 = getPeak(b0), p1 = getPeak(b1);
                const bit = p1 > p0 ? '1' : '0';
                if (Math.max(p0, p1) < -85) {
                    if(bitBuf.current.length > 0 && !syncFound.current) bitBuf.current = "";
                    return;
                }
                bitBuf.current += bit;
                if (!syncFound.current && bitBuf.current.includes(PREAMBLE)) {
                    syncFound.current = true;
                    bitBuf.current = bitBuf.current.slice(bitBuf.current.indexOf(PREAMBLE) + 8);
                }
                if (syncFound.current && bitBuf.current.length >= 8) {
                    if (bitBuf.current.startsWith(STOP_SEQ)) {
                        syncFound.current = false;
                        bitBuf.current = "";
                    } else {
                        const byte = bitBuf.current.slice(0, 8);
                        bitBuf.current = bitBuf.current.slice(8);
                        const charCode = parseInt(byte, 2);
                        if (charCode >= 32 && charCode <= 126) {
                            setRxText(prev => (prev === 'Scanning frequencies...' ? "" : prev) + String.fromCharCode(charCode));
                        }
                    }
                }
                if (bitBuf.current.length > 256) bitBuf.current = "";
            };
            loop();
            startVisuals(sonicCanvasRef.current, ana);
        } catch { notify('Microphone inhibited.'); }
    };

    const generateInduction = async () => {
        if (!targetWord) { notify('Target word required.'); return; }
        
        setIsGenerating(true);
        setInductionScript("");
        
        let systemPrompt = "";
        
        if (inductionMode === 'script') {
            systemPrompt = "Create a 4-step Ericksonian behavioral priming script to subconsciously guide a listener toward the word provided. Be clinical and precise. Output plain text. Do not use any special characters like asterisks or hash symbols in your response.";
        } else {
            systemPrompt = "Create a sequence of 5-7 leading questions designed to guide a subject's thoughts toward the target word provided without mentioning it directly. Use cognitive priming techniques. Output plain text. Do not use any special characters like asterisks or hash symbols in your response.";
        }

        const userQuery = `Target word: ${targetWord}`;

        try {
            const res = await fetch('/api/generate', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ systemPrompt, userQuery })
            });

            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                throw new Error(err.error || `Status ${res.status}`);
            }

            const result = await res.json();
            const text = result.choices?.[0]?.message?.content;
            
            if (text) setInductionScript(text);
            else throw new Error('Void response.');
        } catch (e) { 
            notify(`AI transmission failed: ${e.message || 'Check server API configuration.'}`); 
        } finally {
            setIsGenerating(false);
        }
    };

    return (
        <div className="min-h-screen p-4 md:p-10 flex flex-col max-w-5xl mx-auto space-y-6">
            {toast && <div className="toast" style={{ background: toast.type === 'error' ? 'rgb(239, 68, 68)' : 'rgb(16, 185, 129)' }}>
                <Icon name={toast.type === 'error' ? 'alert' : 'check'} size={14} />
                {toast.msg}
            </div>}
            <header className="glass p-8 rounded-[2.5rem] flex flex-col items-center gap-6 text-center shadow-2xl relative overflow-hidden">
                <div className="absolute top-0 left-0 scanner-line opacity-20" />
                <div className="flex flex-col items-center gap-3">
                    <div className="p-4 bg-indigo-500/10 rounded-2xl text-indigo-400 active-glow">
                        <Icon name={activeTab === 'induction' ? 'brain' : activeTab === 'masking' ? 'waves' : 'radio'} size={32} />
                    </div>
                    <div>
                        <h1 className="text-2xl font-black tracking-tighter leading-none">WORD INDUCTION</h1>
                        <p className="text-[0.6rem] font-bold text-slate-500 tracking-[0.3em] uppercase mt-2">Neural Interface v2.5</p>
                    </div>
                </div>
                <nav className="flex bg-black/40 p-1 rounded-xl border border-white/5 shadow-inner">
                    {['induction', 'masking', 'sonic'].map(t => (
                        <button key={t} onClick={() => { killAllAudio(); setActiveTab(t); }} className={`tab-btn ${activeTab === t ? 'active' : ''}`}>{t}</button>
                    ))}
                </nav>
            </header>
            <main className="flex-1">
                {activeTab === 'induction' && (
                    <div className="space-y-6 animate-in fade-in slide-in-from-bottom-4">
                        <section className="glass p-8 rounded-3xl space-y-6">
                            <div className="flex justify-between items-center">
                                <h2 className="text-[0.6rem] font-black tracking-[0.3em] uppercase text-indigo-400">Prime Generator</h2>
                                <div className="flex bg-black/20 p-1 rounded-lg border border-white/5">
                                    <button 
                                        onClick={() => setInductionMode('script')}
                                        className={`px-3 py-1 text-[0.55rem] font-black uppercase tracking-widest rounded-md transition-all ${inductionMode === 'script' ? 'bg-indigo-600 text-white' : 'text-slate-500'}`}
                                    >
                                        Script
                                    </button>
                                    <button 
                                        onClick={() => setInductionMode('interrogative')}
                                        className={`px-3 py-1 text-[0.55rem] font-black uppercase tracking-widest rounded-md transition-all ${inductionMode === 'interrogative' ? 'bg-indigo-600 text-white' : 'text-slate-500'}`}
                                    >
                                        Questions
                                    </button>
                                </div>
                            </div>
                            <div className="text-[0.55rem] font-mono text-slate-400">AI generation is server-routed through WORD_INDUCTION_API on OpenRouter model openrouter/auto.</div>
                            <div className="flex flex-col md:flex-row gap-4">
                                <input type="text" value={targetWord} onChange={e => setTargetWord(e.target.value)} className="flex-1 bg-black border border-white/10 rounded-2xl p-4 text-sm font-bold focus:border-indigo-500 outline-none" placeholder="Target concept..." onKeyDown={e => e.key === 'Enter' && generateInduction()} />
                                <button onClick={generateInduction} disabled={isGenerating} className="px-8 py-4 bg-indigo-600 hover:bg-indigo-500 rounded-2xl text-[0.6rem] font-black uppercase tracking-widest flex items-center justify-center gap-3 disabled:opacity-50 transition-all">
                                    {isGenerating ? <Icon name="refresh" className="spin" size={16} /> : <Icon name="sparkles" size={16} />}
                                    Synthesize
                                </button>
                            </div>
                            {inductionScript && <div className="p-6 bg-black/20 rounded-2xl border border-white/5 text-sm leading-relaxed text-slate-300 whitespace-pre-wrap font-medium animate-in zoom-in-95">
                                {inductionScript}
                            </div>}
                        </section>
                    </div>
                )}
                {activeTab === 'masking' && (
                    <div className="space-y-6 animate-in fade-in slide-in-from-bottom-4">
                        <section className="glass p-8 rounded-3xl space-y-8">
                            <h2 className="text-[0.6rem] font-black tracking-[0.3em] uppercase text-indigo-400">Audio Masking Engine</h2>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div className="space-y-4">
                                    <label className="text-[0.55rem] font-black text-slate-500 uppercase flex items-center gap-2">Carrier Signal</label>
                                    <div className="relative group">
                                        <input type="file" accept="audio/*" onChange={e => handleFile(e, 'bg')} className="absolute inset-0 opacity-0 cursor-pointer" />
                                        <div className={`p-4 rounded-xl border-2 border-dashed ${bgFile ? 'border-indigo-500/50 bg-indigo-500/5' : 'border-white/10 group-hover:border-white/20'} text-center text-xs font-bold transition-colors`}>
                                            {bgFile ? bgFile.name : 'Inject Carrier'}
                                        </div>
                                    </div>
                                </div>
                                <div className="space-y-4">
                                    <label className="text-[0.55rem] font-black text-slate-500 uppercase flex items-center gap-2">Directive Voice</label>
                                    <div className="relative group">
                                        <input type="file" accept="audio/*" onChange={e => handleFile(e, 'voice')} className="absolute inset-0 opacity-0 cursor-pointer" />
                                        <div className={`p-4 rounded-xl border-2 border-dashed ${voiceFile ? 'border-indigo-500/50 bg-indigo-500/5' : 'border-white/10 group-hover:border-white/20'} text-center text-xs font-bold transition-colors`}>
                                            {voiceFile ? voiceFile.name : 'Inject Directive'}
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div className="space-y-6">
                                <div className="space-y-3">
                                    <div className="flex justify-between text-[0.55rem] font-black text-slate-400 uppercase">
                                        <span>Masking Depth (Filter)</span>
                                        <span>{maskingLevel}%</span>
                                    </div>
                                    <input type="range" value={maskingLevel} min="0" max="100" onChange={e => setMaskingLevel(e.target.value)} />
                                </div>
                                <div className="space-y-3">
                                    <div className="flex justify-between text-[0.55rem] font-black text-slate-400 uppercase">
                                        <span>Subliminal Gain</span>
                                        <span>{volumeRatio}%</span>
                                    </div>
                                    <input type="range" value={volumeRatio} min="0" max="100" onChange={e => setVolumeRatio(e.target.value)} />
                                </div>
                            </div>
                            <div className="relative h-32 bg-black/40 rounded-2xl overflow-hidden border border-white/5">
                                <canvas ref={canvasRef} className="w-full h-full" width={800} height={128} />
                                {!isPlaying && !isDecoding && <div className="absolute inset-0 flex items-center justify-center text-[0.6rem] font-black tracking-widest text-slate-600 uppercase">Oscilloscope Idle</div>}
                                {isDecoding && <div className="absolute inset-0 flex items-center justify-center bg-black/60 backdrop-blur-sm">
                                    <Icon name="refresh" className="spin text-indigo-500" size={24} />
                                </div>}
                            </div>
                            <button onClick={igniteMask} disabled={isDecoding} className={`w-full py-6 rounded-2xl font-black uppercase tracking-[0.3em] flex items-center justify-center gap-4 transition-all ${isPlaying ? 'bg-red-500/20 text-red-400 border border-red-500/50' : 'bg-indigo-600 text-white shadow-xl hover:bg-indigo-500 disabled:opacity-50'}`}>
                                <Icon name={isPlaying ? 'stop' : 'play'} size={20} />
                                {isPlaying ? 'Terminate Engine' : 'Ignite Engine'}
                            </button>
                        </section>
                    </div>
                )}
                {activeTab === 'sonic' && (
                    <div className="space-y-6 animate-in fade-in slide-in-from-bottom-4">
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <section className="glass p-8 rounded-3xl space-y-6">
                                <h2 className="text-[0.6rem] font-black tracking-[0.3em] uppercase text-indigo-400">FSK Transmitter</h2>
                                <textarea value={txText} onChange={e => setTxText(e.target.value)} className="w-full h-32 bg-black border border-white/10 rounded-2xl p-4 text-xs font-mono focus:border-indigo-500 outline-none resize-none" placeholder="Payload string (max 256 chars)..." maxLength={256} />
                                <button onClick={transmit} className={`w-full py-4 rounded-xl font-black uppercase text-[0.6rem] tracking-widest flex items-center justify-center gap-3 transition-all ${isTransmitting ? 'bg-amber-500/20 text-amber-400 border border-amber-500/50' : 'bg-indigo-600 text-white hover:bg-indigo-500'}`}>
                                    {isTransmitting ? 'Broadcasting...' : 'Begin Broadcast'}
                                </button>
                                <div className="p-4 bg-black/20 rounded-xl text-[0.5rem] font-mono text-slate-500 space-y-1 uppercase tracking-tight">
                                    <div>Mark: {FREQ_1}Hz</div>
                                    <div>Space: {FREQ_0}Hz</div>
                                    <div>Clock: {BAUD}bps</div>
                                </div>
                            </section>
                            <section className="glass p-8 rounded-3xl space-y-6">
                                <h2 className="text-[0.6rem] font-black tracking-[0.3em] uppercase text-indigo-400">FSK Receiver</h2>
                                <div className="h-32 bg-black border border-white/10 rounded-2xl p-4 relative overflow-hidden flex flex-col justify-end">
                                    {isListening && <canvas ref={sonicCanvasRef} className="absolute inset-0 w-full h-full opacity-40 pointer-events-none" width={400} height={128} />}
                                    <div className="text-xs font-mono break-all z-10 leading-relaxed max-h-full overflow-y-auto no-scrollbar">{rxText || 'Awaiting signal...'}</div>
                                </div>
                                <button onClick={listen} className={`w-full py-4 rounded-xl font-black uppercase text-[0.6rem] tracking-widest flex items-center justify-center gap-3 transition-all ${isListening ? 'bg-red-500/20 text-red-400 border border-red-500/50' : 'bg-slate-700 text-white hover:bg-slate-600'}`}>
                                    <Icon name="mic" size={14} />
                                    {isListening ? 'Stop Scanning' : 'Initiate Scan'}
                                </button>
                                {isListening && <div className="text-center text-[0.5rem] text-indigo-500 font-black animate-pulse uppercase tracking-[0.2em]">Temporal sync active</div>}
                            </section>
                        </div>
                    </div>
                )}
            </main>
            <footer className="text-center p-8 text-[0.55rem] font-black text-slate-700 uppercase tracking-[0.5em]">
                System Secure · Neural Protocols Initialized
            </footer>
        </div>
    );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
